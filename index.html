<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Master</title>
    <script>
        (function () {
            try {
                var KEY = "kanji-master-theme";
                var pref = localStorage.getItem(KEY) || "dark";
                document.documentElement.setAttribute("data-theme", pref === "light" ? "light" : "dark");
            } catch (e) {}
        })();
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="JLPT N5 and N4 kanji vocabulary flashcards.">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-title-row">
                <div class="header-brand">
                    <h1>Kanji Master</h1>
                </div>
                <div class="header-actions" role="toolbar" aria-label="App tools">
                    <button id="vocab-list-btn" class="icon-btn vocab-list-btn" type="button" aria-label="Open lesson word list">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"></path></svg>
                    </button>
                    <button id="settings-btn" class="icon-btn settings-btn" type="button" aria-label="Settings">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </button>
                </div>
            </div>
            <div class="chapter-selector dual-select" role="group" aria-label="Deck selection">
                <label class="select-field select-field--level">
                    <span class="select-label">Level</span>
                    <select id="level-select" class="kanji-select" aria-label="JLPT level"></select>
                </label>
                <label class="select-field select-field--lesson">
                    <span class="select-label">Lesson</span>
                    <select id="lesson-select" class="kanji-select" aria-label="Select lesson"></select>
                </label>
            </div>
        </header>

        <main>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            
            <div class="card-counter" id="card-counter">
                Card 1 of X
            </div>

            <div class="scene">
                <div class="card" id="flashcard">
                    <div class="card-face card-front" aria-label="Kanji Front">
                        <div class="content-wrapper">
                            <span class="kanji-text" id="front-kanji">漢</span>
                            <span class="instruction">Tap to flip</span>
                        </div>
                    </div>
                    <div class="card-face card-back" aria-label="Kanji Details">
                        <div class="content-wrapper">
                            <div class="furigana-container">
                                <span class="furigana" id="back-furigana">かんじ</span>
                                <button id="pronounce-btn" class="pronounce-btn" aria-label="Pronounce">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                                </button>
                            </div>
                            <div class="kanji-text back-kanji" id="back-kanji">漢字</div>
                            <div class="divider"></div>
                            <div class="meaning" id="back-meaning">Chinese Characters</div>
                            <span class="instruction">Tap to flip</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="prev-btn" class="nav-btn" aria-label="Previous Card">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <div class="action-buttons">
                    <button id="shuffle-btn" class="icon-btn" aria-label="Shuffle Cards">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
                    </button>
                </div>
                <button id="next-btn" class="nav-btn" aria-label="Next Card">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Settings -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content modal-content--settings">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="close-settings-btn" class="close-btn" aria-label="Close settings">&times;</button>
            </div>
            <div class="settings-section settings-section--theme">
                <div class="setting-item setting-item--theme">
                    <span class="setting-label" id="theme-select-label">Appearance</span>
                    <select id="theme-select" class="theme-select" aria-labelledby="theme-select-label">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>
            </div>
            <div class="settings-section settings-section--last">
                <div class="setting-item">
                    <span class="setting-label">Always Shuffle New Chapters</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="random-order-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Lesson word list -->
    <div id="vocab-modal" class="modal hidden">
        <div class="modal-content modal-content--vocab">
            <div class="modal-header modal-header--vocab">
                <div>
                    <h2>Lesson word list</h2>
                    <p class="modal-deck-label" id="vocab-deck-label"></p>
                </div>
                <button id="close-vocab-btn" class="close-btn" aria-label="Close word list">&times;</button>
            </div>
            <div class="review-section review-section--vocab-only">
                <ul id="vocabulary-list" class="vocab-list">
                    <!-- Populated by JS -->
                </ul>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
